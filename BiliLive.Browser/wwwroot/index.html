<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <title>MapWorkShop.Browser</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/webp" href="./favicon.webp" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./app.css" />
    <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=eusGwb4Y9lhM2CxBVNAu1M8nanwEqIcS0EQDFisb4SBUCuhJLA0H-KaM835wmYnM" charset="UTF-8"></script><style>
    #loading-mask {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f8f9fa;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: inherit;
        transition: opacity 0.5s ease-out;
    }

    .spinner {
        width: 98px;
        height: 98px;
        animation: rotate 2s linear infinite;
        will-change: transform;
    }

    .spinner circle {
        fill: none;
        stroke: #6750a4;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-dasharray: 1, 200;
        stroke-dashoffset: 0;
        animation: dash 1.5s ease-in-out infinite;
        will-change: stroke-dashoffset, stroke-dasharray;
    }

    @keyframes rotate {
        100% { transform: rotate(360deg); }
    }

    @keyframes dash {
        0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; }
        50% { stroke-dasharray: 89, 200; stroke-dashoffset: -35px; }
        100% { stroke-dasharray: 89, 200; stroke-dashoffset: -124px; }
    }

    #loading-text {
        margin-top: 24px;
        color: #1d1b20;
        font-size: 18px;
        font-weight: 500;
    }

    @media (prefers-color-scheme: dark) {
        #loading-mask { background-color: #1c1b1f; }
        #loading-text { color: #e6e1e5; }
        .spinner circle { stroke: #d0bcff; }
    }
</style>
</head>

<body style="margin: 0; overflow: hidden">
<div id="out">
</div>

<div id="loading-mask">
    <svg class="spinner" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20"></circle>
    </svg>
    <div id="loading-text">正在加载...</div>
</div>

<script type="module">
    import { dotnet } from './_framework/dotnet.js';

    const text = document.getElementById("loading-text");

    let loadedBytes = 0;
    let totalBytes = 0;

    try {
        const dotnetRuntime = await dotnet
            .withDiagnosticTracing(false)
            .withApplicationArgumentsFromQuery()
            .withResourceLoader((type, name, defaultUri, integrity) => {
                if (type === "dotnetjs") return defaultUri;

                return fetch(defaultUri, { integrity }).then(resp => {
                    if (!resp.ok) return resp;

                    const contentLength = resp.headers.get("Content-Length");
                    if (contentLength) {
                        totalBytes += parseInt(contentLength);
                    }

                    const reader = resp.body.getReader();
                    return new Response(new ReadableStream({
                        async pull(controller) {
                            const { done, value } = await reader.read();
                            if (done) {
                                controller.close();
                            } else {
                                loadedBytes += value.length;
                                // 使用 requestAnimationFrame 避免频繁操作 DOM 导致卡顿
                                if (!window._loadingPending) {
                                    window._loadingPending = true;
                                    requestAnimationFrame(() => {
                                        text.textContent = "正在启动应用...";
                                        window._loadingPending = false;
                                    });
                                }
                                controller.enqueue(value);
                            }
                        }
                    }), resp);
                });
            })
            .create();

        // 给浏览器一点喘息时间来维持动画
        await new Promise(resolve => setTimeout(resolve, 100));

        const config = dotnetRuntime.getConfig();

        // 在执行最沉重的 runMain 之前暂停圆环动画，使其停在当前状态，防止由于主线程卡顿导致的掉帧视觉
        const spinner = document.querySelector(".spinner");
        if (spinner) {
            spinner.style.animationPlayState = "paused";
            const circle = spinner.querySelector("circle");
            if (circle) circle.style.animationPlayState = "paused";
        }
        text.textContent = "正在启动应用...";

        await dotnetRuntime.runMain(config.mainAssemblyName, [globalThis.location.href]);

        // 运行完成后移除加载遮罩
        const mask = document.getElementById("loading-mask");
        mask.style.opacity = "0";
        setTimeout(() => {
            mask.style.display = "none";
        }, 500);
    } catch (err) {
        console.error("Dotnet Startup Error:", err);
        const text = document.getElementById("loading-text");
        text.style.color = "#ffb4ab";
        text.innerHTML = `启动失败: ${err.message || err.name || JSON.stringify(err)}`;
        const spinner = document.querySelector(".spinner");
        if (spinner) spinner.style.display = "none";
    }
</script>
</body>

</html>
